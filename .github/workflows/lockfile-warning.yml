name: Warn on Gemfile.lock Changes

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  warn-lockfile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Check if Gemfile.lock changed
        id: check_lockfile
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          if git diff --name-only origin/${{ github.event.pull_request.base.ref }} | grep -q "^Gemfile.lock$"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR
        if: steps.check_lockfile.outputs.changed == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ⚠️ **Notice: `Gemfile.lock` was modified in this PR.**

            For our lab website, we keep `Gemfile.lock` tracked to ensure reproducible CI/CD builds.

            Please confirm whether this change is intentional (e.g., adding or updating a Ruby/Jekyll dependency).

            If this modification was unintended (often caused by running `bundle install` locally), please revert the file to match the base branch.

            Thanks for helping keep our deployment stable 🙌
